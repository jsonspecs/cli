name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jsonspecs-cli
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout jsonspecs-cli
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: jsonspecs-cli
      - name: Resolve rules source ref
        id: rules
        working-directory: jsonspecs-cli
        run: echo "ref=$(node -p 'require("./package.json").config.rulesGitRef')" >> "$GITHUB_OUTPUT"
      - name: Checkout matching rules source
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: jsonspecs/rules
          ref: ${{ steps.rules.outputs.ref }}
          path: rules
      # actions/setup-node@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: jsonspecs-cli/package-lock.json
      - name: Install rules runtime dependencies
        working-directory: rules
        run: npm ci --omit=dev --ignore-scripts --no-audit --no-fund
      - run: npm ci
      - run: npm test
      - run: npm run test:pack
